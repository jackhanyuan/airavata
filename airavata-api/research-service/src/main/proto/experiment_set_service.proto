syntax = "proto3";

package org.apache.airavata.api.experimentset;

option java_package = "org.apache.airavata.api.experimentset";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "experiment_service.proto";

// ExperimentSetService provides RPCs for managing gridsearch experiment sets.
service ExperimentSetService {
  rpc CreateExperimentSet    (CreateExperimentSetRequest) returns (ExperimentSet) {
    option (google.api.http) = { post: "/api/v1/experiment-sets" body: "*" }; }
  rpc LaunchExperimentSet    (LaunchExperimentSetRequest) returns (ExperimentSet) {
    option (google.api.http) = { post: "/api/v1/experiment-sets/{experiment_set_id}:launch" }; }
  rpc GetExperimentSet       (GetExperimentSetRequest)    returns (ExperimentSet) {
    option (google.api.http) = { get: "/api/v1/experiment-sets/{experiment_set_id}" }; }
  rpc ListExperimentSets     (ListExperimentSetsRequest)  returns (ListExperimentSetsResponse) {
    option (google.api.http) = { get: "/api/v1/experiment-sets" }; }
  rpc GetExperimentSetStatus (GetExperimentSetRequest)    returns (ExperimentSetStatus) {
    option (google.api.http) = { get: "/api/v1/experiment-sets/{experiment_set_id}/status" }; }
  rpc DeleteExperimentSet    (DeleteExperimentSetRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/api/v1/experiment-sets/{experiment_set_id}" }; }
}

message ValueList { repeated string values = 1; }
message SweepSpec {
  org.apache.airavata.api.experiment.ExperimentSpec base = 1;
  map<string, ValueList> sweep_axes = 2;
  string name_prefix = 3;
}
message ExperimentIdList { repeated string experiment_ids = 1; }
message CreateExperimentSetRequest {
  string set_name = 1;
  oneof source { SweepSpec sweep = 2; ExperimentIdList existing = 3; }
}
message LaunchExperimentSetRequest { string experiment_set_id = 1; string notification_email = 2; }
message GetExperimentSetRequest    { string experiment_set_id = 1; }
message DeleteExperimentSetRequest { string experiment_set_id = 1; }
message ListExperimentSetsRequest  { int32 limit = 1; int32 offset = 2; }
message ExperimentSet {
  string experiment_set_id = 1; string set_name = 2; string owner = 3; string gateway_id = 4;
  repeated string experiment_ids = 5; SweepSpec sweep = 6; int64 creation_time = 7; int64 updated_time = 8;
}
message ListExperimentSetsResponse { repeated ExperimentSet experiment_sets = 1; }
enum AggregateState { QUEUED = 0; RUNNING = 1; COMPLETED = 2; FAILED = 3; MIXED = 4; }
message ExperimentStatusItem { string experiment_id = 1; string state = 2; string process_id = 3; }
message ExperimentSetStatus {
  string experiment_set_id = 1; int32 total = 2; map<string,int32> counts_by_state = 3;
  AggregateState aggregate = 4; repeated ExperimentStatusItem items = 5;
}
