syntax = "proto3";

package org.apache.airavata.api.iam.groupmanager;

option java_package = "org.apache.airavata.api.iam.groupmanager";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/group/group_manager.proto";

// GroupManagerService provides RPCs for managing user groups.
service GroupManagerService {

  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse) {
    option (google.api.http) = {
      post: "/api/v1/groups"
      body: "group"
    };
  }

  rpc UpdateGroup(UpdateGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/groups/{group.id}"
      body: "group"
    };
  }

  // Additive declarative create: the client sends the desired full members + admins lists in
  // GroupModel and the server reconciles (computes add/remove deltas) in one call. Unlike CreateGroup
  // (which persists only metadata and ignores members/admins), this rpc also applies the roster, so a
  // thin client need not diff and fan out the membership/admin mutator rpcs itself.
  rpc CreateGroupReconciled(CreateGroupRequest) returns (GroupWithAccess) {
    option (google.api.http) = {
      post: "/api/v1/groups:reconcile"
      body: "group"
    };
  }

  // Additive declarative update: the client sends the desired full members + admins lists in
  // GroupModel and the server reconciles current vs desired (add/remove members and admins, promoting
  // admins-not-yet-members to members) plus the metadata, in one call. Unlike UpdateGroup (which
  // persists only metadata and ignores members/admins), this rpc reconciles the roster server-side.
  rpc UpdateGroupReconciled(UpdateGroupRequest) returns (GroupWithAccess) {
    option (google.api.http) = {
      put: "/api/v1/groups/{group.id}:reconcile"
      body: "group"
    };
  }

  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/groups/{group_id}"
    };
  }

  rpc GetGroup(GetGroupRequest) returns (org.apache.airavata.model.group.GroupModel) {
    option (google.api.http) = {
      get: "/api/v1/groups/{group_id}"
    };
  }

  // Additive: GetGroup plus the caller's six server-computed group-access flags (and the
  // group's members), so a client does not recompute group access from separate
  // GroupManager / gateway-groups round-trips.
  rpc GetGroupWithAccess(GetGroupRequest) returns (GroupWithAccess) {
    option (google.api.http) = {
      get: "/api/v1/groups/{group_id}:withAccess"
    };
  }

  rpc GetGroups(GetGroupsRequest) returns (GetGroupsResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups"
    };
  }

  // Additive: the list analogue of GetGroupWithAccess. Each group is unioned with the
  // caller's six server-computed group-access flags; members/admins are populated only for
  // insiders (see GetGroupWithAccess) so non-members do not see the roster.
  rpc GetGroupsWithAccess(GetGroupsRequest) returns (GetGroupsWithAccessResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups:withAccess"
    };
  }

  rpc GetAllGroupsUserBelongs(GetAllGroupsUserBelongsRequest) returns (GetAllGroupsUserBelongsResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups/user/{user_name}"
    };
  }

  // Additive: the with-access analogue of GetAllGroupsUserBelongs. Each group the
  // user belongs to is unioned with the caller's six server-computed group-access
  // flags (members/admins populated for insiders, as GetGroupsWithAccess), so the
  // portal no longer fans out per-group HasAdminAccess / GetGatewayGroups lookups.
  rpc GetAllGroupsUserBelongsWithAccess(GetAllGroupsUserBelongsRequest) returns (GetGroupsWithAccessResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups/user/{user_name}:withAccess"
    };
  }

  rpc AddUsersToGroup(AddUsersToGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/groups/{group_id}/members"
      body: "*"
    };
  }

  rpc RemoveUsersFromGroup(RemoveUsersFromGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/groups/{group_id}/members"
    };
  }

  rpc TransferGroupOwnership(TransferGroupOwnershipRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/groups/{group_id}/ownership"
      body: "*"
    };
  }

  rpc AddGroupAdmins(AddGroupAdminsRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/groups/{group_id}/admins"
      body: "*"
    };
  }

  rpc RemoveGroupAdmins(RemoveGroupAdminsRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/groups/{group_id}/admins"
    };
  }

  rpc HasAdminAccess(HasAdminAccessRequest) returns (HasAdminAccessResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups/{group_id}/admins/{admin_id}:check"
    };
  }

  rpc HasOwnerAccess(HasOwnerAccessRequest) returns (HasOwnerAccessResponse) {
    option (google.api.http) = {
      get: "/api/v1/groups/{group_id}/owners/{owner_id}:check"
    };
  }
}

// Request/Response messages

message CreateGroupRequest {
  org.apache.airavata.model.group.GroupModel group = 1;
}

message CreateGroupResponse {
  string group_id = 1;
}

message UpdateGroupRequest {
  org.apache.airavata.model.group.GroupModel group = 1;
}

message DeleteGroupRequest {
  string group_id = 1;
  string owner_id = 2;
}

message GetGroupRequest {
  string group_id = 1;
}

// The caller's six cross-context group-access flags. A group needs more than the
// two-flag commons.AccessFlags: an admin lookup, ownership, membership, and whether the
// group is one of the three gateway-identity groups (admins / read-only admins / default users).
message GroupAccessFlags {
  bool is_admin = 1;
  bool is_owner = 2;
  bool is_member = 3;
  bool is_gateway_admins_group = 4;
  bool is_read_only_gateway_admins_group = 5;
  bool is_default_gateway_users_group = 6;
}

// A GroupModel (members populated) unioned with the caller's group-access flags.
message GroupWithAccess {
  org.apache.airavata.model.group.GroupModel group = 1;
  GroupAccessFlags access = 2;
}

message GetGroupsRequest {
}

message GetGroupsResponse {
  repeated org.apache.airavata.model.group.GroupModel groups = 1;
}

message GetGroupsWithAccessResponse {
  repeated GroupWithAccess groups = 1;
}

message GetAllGroupsUserBelongsRequest {
  string user_name = 1;
}

message GetAllGroupsUserBelongsResponse {
  repeated org.apache.airavata.model.group.GroupModel groups = 1;
}

message AddUsersToGroupRequest {
  string group_id = 1;
  repeated string user_ids = 2;
}

message RemoveUsersFromGroupRequest {
  string group_id = 1;
  repeated string user_ids = 2;
}

message TransferGroupOwnershipRequest {
  string group_id = 1;
  string new_owner_id = 2;
}

message AddGroupAdminsRequest {
  string group_id = 1;
  repeated string admin_ids = 2;
}

message RemoveGroupAdminsRequest {
  string group_id = 1;
  repeated string admin_ids = 2;
}

message HasAdminAccessRequest {
  string group_id = 1;
  string admin_id = 2;
}

message HasAdminAccessResponse {
  bool has_access = 1;
}

message HasOwnerAccessRequest {
  string group_id = 1;
  string owner_id = 2;
}

message HasOwnerAccessResponse {
  bool has_access = 1;
}
