syntax = "proto3";

package org.apache.airavata.api.groupprofile;

option java_package = "org.apache.airavata.api.groupprofile";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "org/apache/airavata/model/appcatalog/groupresourceprofile/group_resource_profile.proto";
import "org/apache/airavata/model/appcatalog/gatewaygroups/gateway_groups.proto";
import "org/apache/airavata/model/commons/commons.proto";

// GroupResourceProfileService provides RPCs for managing group resource profiles,
// compute preferences, compute resource policies, and batch queue policies.
service GroupResourceProfileService {

  // --- Group Resource Profiles ---

  rpc CreateGroupResourceProfile(CreateGroupResourceProfileRequest) returns (org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile) {
    option (google.api.http) = {
      post: "/api/v1/group-profiles"
      body: "group_resource_profile"
    };
  }

  rpc GetGroupResourceProfile(GetGroupResourceProfileRequest) returns (org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}"
    };
  }

  // Additive: GetGroupResourceProfile plus the caller's server-computed access
  // flags, so a client does not recompute access from a separate sharing round-trip.
  rpc GetGroupResourceProfileWithAccess(GetGroupResourceProfileRequest) returns (GroupResourceProfileWithAccess) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}:withAccess"
    };
  }

  rpc UpdateGroupResourceProfile(UpdateGroupResourceProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/group-profiles/{group_resource_profile_id}"
      body: "group_resource_profile"
    };
  }

  // Reconcile-then-update for thin clients: removes the child compute preferences /
  // resource policies / batch-queue policies absent from the incoming profile, applies
  // the update, and returns the refreshed profile with the caller's access flags —
  // replacing the SDK helper's client-side reconcile loop.
  rpc UpdateGroupResourceProfileReconciled(UpdateGroupResourceProfileRequest) returns (GroupResourceProfileWithAccess) {
    option (google.api.http) = {
      put: "/api/v1/group-profiles/{group_resource_profile_id}:reconciled"
      body: "group_resource_profile"
    };
  }

  rpc RemoveGroupResourceProfile(RemoveGroupResourceProfileRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/group-profiles/{group_resource_profile_id}"
    };
  }

  rpc GetGroupResourceList(GetGroupResourceListRequest) returns (GetGroupResourceListResponse) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles"
    };
  }

  // Additive: GetGroupResourceList plus each profile's server-computed access flags
  // for the caller, so a client does not recompute access from a separate sharing round-trip.
  rpc GetGroupResourceListWithAccess(GetGroupResourceListRequest) returns (GetGroupResourceListWithAccessResponse) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles:withAccess"
    };
  }

  // --- Group Compute Preferences ---

  rpc GetGroupComputePreference(GetGroupComputePreferenceRequest) returns (org.apache.airavata.model.appcatalog.groupresourceprofile.GroupComputeResourcePreference) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}/compute-preferences/{compute_resource_id}"
    };
  }

  rpc RemoveGroupComputePrefs(RemoveGroupComputePrefsRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/group-profiles/{group_resource_profile_id}/compute-preferences/{compute_resource_id}"
    };
  }

  rpc GetGroupComputePrefList(GetGroupComputePrefListRequest) returns (GetGroupComputePrefListResponse) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}/compute-preferences"
    };
  }

  // --- Compute Resource Policies ---

  rpc GetGroupComputeResourcePolicy(GetGroupComputeResourcePolicyRequest) returns (org.apache.airavata.model.appcatalog.groupresourceprofile.ComputeResourcePolicy) {
    option (google.api.http) = {
      get: "/api/v1/group-compute-policies/{resource_policy_id}"
    };
  }

  rpc RemoveGroupComputeResourcePolicy(RemoveGroupComputeResourcePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/group-compute-policies/{resource_policy_id}"
    };
  }

  rpc GetGroupComputeResourcePolicyList(GetGroupComputeResourcePolicyListRequest) returns (GetGroupComputeResourcePolicyListResponse) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}/compute-policies"
    };
  }

  // --- Batch Queue Resource Policies ---

  rpc GetBatchQueueResourcePolicy(GetBatchQueueResourcePolicyRequest) returns (org.apache.airavata.model.appcatalog.groupresourceprofile.BatchQueueResourcePolicy) {
    option (google.api.http) = {
      get: "/api/v1/batch-queue-policies/{resource_policy_id}"
    };
  }

  rpc RemoveGroupBatchQueueResourcePolicy(RemoveGroupBatchQueueResourcePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/batch-queue-policies/{resource_policy_id}"
    };
  }

  rpc GetGroupBatchQueuePolicyList(GetGroupBatchQueuePolicyListRequest) returns (GetGroupBatchQueuePolicyListResponse) {
    option (google.api.http) = {
      get: "/api/v1/group-profiles/{group_resource_profile_id}/batch-queue-policies"
    };
  }

  // --- Gateway Groups ---

  rpc GetGatewayGroups(GetGatewayGroupsRequest) returns (org.apache.airavata.model.appcatalog.gatewaygroups.GatewayGroups) {
    option (google.api.http) = {
      get: "/api/v1/gateway-groups"
    };
  }
}

// --- Group Resource Profile Request/Response messages ---

message CreateGroupResourceProfileRequest {
  org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile group_resource_profile = 1;
}

message GetGroupResourceProfileRequest {
  string group_resource_profile_id = 1;
}

// A GroupResourceProfile unioned with the caller's access flags (see commons.AccessFlags).
message GroupResourceProfileWithAccess {
  org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile group_resource_profile = 1;
  org.apache.airavata.model.commons.AccessFlags access = 2;
}

message UpdateGroupResourceProfileRequest {
  string group_resource_profile_id = 1;
  org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile group_resource_profile = 2;
}

message RemoveGroupResourceProfileRequest {
  string group_resource_profile_id = 1;
}

message GetGroupResourceListRequest {}

message GetGroupResourceListResponse {
  repeated org.apache.airavata.model.appcatalog.groupresourceprofile.GroupResourceProfile group_resource_profiles = 1;
}

message GetGroupResourceListWithAccessResponse {
  repeated GroupResourceProfileWithAccess profiles = 1;
}

// --- Group Compute Preference Request/Response messages ---

message GetGroupComputePreferenceRequest {
  string group_resource_profile_id = 1;
  string compute_resource_id = 2;
}

message RemoveGroupComputePrefsRequest {
  string group_resource_profile_id = 1;
  string compute_resource_id = 2;
}

message GetGroupComputePrefListRequest {
  string group_resource_profile_id = 1;
}

message GetGroupComputePrefListResponse {
  repeated org.apache.airavata.model.appcatalog.groupresourceprofile.GroupComputeResourcePreference group_compute_resource_preferences = 1;
}

// --- Compute Resource Policy Request/Response messages ---

message GetGroupComputeResourcePolicyRequest {
  string resource_policy_id = 1;
}

message RemoveGroupComputeResourcePolicyRequest {
  string resource_policy_id = 1;
}

message GetGroupComputeResourcePolicyListRequest {
  string group_resource_profile_id = 1;
}

message GetGroupComputeResourcePolicyListResponse {
  repeated org.apache.airavata.model.appcatalog.groupresourceprofile.ComputeResourcePolicy compute_resource_policies = 1;
}

// --- Batch Queue Resource Policy Request/Response messages ---

message GetBatchQueueResourcePolicyRequest {
  string resource_policy_id = 1;
}

message RemoveGroupBatchQueueResourcePolicyRequest {
  string resource_policy_id = 1;
}

message GetGroupBatchQueuePolicyListRequest {
  string group_resource_profile_id = 1;
}

message GetGroupBatchQueuePolicyListResponse {
  repeated org.apache.airavata.model.appcatalog.groupresourceprofile.BatchQueueResourcePolicy batch_queue_resource_policies = 1;
}

// --- Gateway Groups Request/Response messages ---

message GetGatewayGroupsRequest {}
